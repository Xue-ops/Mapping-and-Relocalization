    tf_yaw: 0.0
    tf_parent_frame: base_link
    tf_child_frame: mid360_front_frame 

    mid2_tf_x:  0.0425
    mid2_tf_y: -0.17337
    mid2_tf_z: 0.40591
    mid2_tf_roll: 0.785398
    mid2_tf_pitch: 0.0
    mid2_tf_yaw: 0.0
    mid2_tf_parent_frame: base_link
    mid2_tf_child_frame: mid360_back_frame